<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Empleado</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#eaeaea;
}

.card {
  background:#d0ebff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

input, button {
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

input[readonly] {
  background:#f0f0f0;
}

button {
  background:#4dabf7;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover {
  background:#339af0;
}
</style>

</head>
<body>

<h2 style="color:#1971c2;">🚚 Panel Empleado</h2>

<!-- MENU INICIAL PARA INGRESAR NOMBRE -->
<div id="loginMenu" class="card">
  <input type="text" id="nombre" placeholder="Tu nombre">
  <button onclick="verClientes()">Ver clientes</button>
</div>

<!-- NUEVO MENU DE EMPLEADO -->
<div id="empleadoMenu" style="display:none;">
  <div class="card">
    <h3 id="saludo">Hola, Empleado</h3>
    <input type="date" id="fechaFiltro" onchange="filtrarFecha()">
  </div>

  <!-- AGREGAR CLIENTE -->
  <div class="card">
    <h3>➕ Agregar cliente</h3>
    <input type="text" id="nuevoCliente" placeholder="Nombre del cliente">
    <input type="date" id="nuevaFecha">
    <input type="text" id="nuevoEmpleado" readonly>
    <button onclick="agregarCliente()">Agregar cliente</button>
  </div>

  <!-- LISTA DE CLIENTES -->
  <div id="lista"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
function normalizar(texto) {
  return texto.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function fechaHora() {
  return new Date().toLocaleString("es-AR", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

const firebaseConfig = {
  apiKey: "AIzaSyB7W3rnQ8iuwyUKgZam4DIdyFkSp7Yh66g",
  databaseURL: "https://repartobackup-1ef28-default-rtdb.firebaseio.com/"

};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = {};
let nombreActual = "";
let fechaActual = "";

// TIEMPO REAL
db.ref("clientes").on("value", snap => {
  data = snap.val() || {};
  render();
});

function hoy() {
  return new Date().toISOString().split("T")[0];
}

// MOSTRAR MENU DE EMPLEADO
function verClientes() {
  const nombreInput = document.getElementById("nombre").value;
  if (!nombreInput) {
    alert("Escribí tu nombre");
    return;
  }

  nombreActual = normalizar(nombreInput);
  fechaActual = hoy();

  document.getElementById("loginMenu").style.display = "none";
  document.getElementById("empleadoMenu").style.display = "block";
  document.getElementById("saludo").innerText = `Hola, ${nombreInput}`;
  document.getElementById("nuevoEmpleado").value = nombreActual;

  document.getElementById("fechaFiltro").value = fechaActual;
  document.getElementById("nuevaFecha").value = fechaActual; // AUTOCOMPLETAR NUEVO CLIENTE

  render();
}

// FILTRAR POR FECHA
function filtrarFecha() {
  const fechaSel = document.getElementById("fechaFiltro").value;
  fechaActual = fechaSel || hoy();
  document.getElementById("nuevaFecha").value = fechaActual; // AUTOCOMPLETAR NUEVO CLIENTE
  render();
}

// MARCAR ENTREGADO
function marcar(id, c) {
  db.ref("clientes/" + id).update({
    entregado: !c.entregado,
    hora: !c.entregado ? fechaHora() : null
  });
}

// AGREGAR CLIENTE
function agregarCliente() {
  const cliente = document.getElementById("nuevoCliente").value;
  const fecha = document.getElementById("nuevaFecha").value || hoy();
  const empleado = document.getElementById("nuevoEmpleado").value;

  if (!cliente || !empleado) {
    alert("Completar todos los campos");
    return;
  }

  db.ref("clientes").push({
    nombre: cliente,
    empleado: empleado,
    fecha: fecha,
    entregado: false,
    hora: null,
    observacion: ""
  });

  // Limpiar campo cliente y mantener fecha
  document.getElementById("nuevoCliente").value = "";
}

// RENDER
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  Object.entries(data)
    .filter(([id,c]) =>
      c.empleado === nombreActual &&
      c.fecha === fechaActual
    )
    .forEach(([id,c]) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <b>${c.nombre}</b><br>
        Estado: ${c.entregado ? "✔ Entregado" : "Pendiente"}<br>
        Fecha entrega: ${c.hora || "-"}<br>
        Observación: ${c.observacion || "-"}<br>
      `;
      const btn = document.createElement("button");
      btn.textContent = c.entregado ? "Desmarcar" : "Marcar entregado";
      btn.onclick = () => marcar(id,c);
      card.appendChild(btn);
      lista.appendChild(card);
    });
}
</script>

</body>
</html>
