<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Empleado</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button { margin-top:5px; cursor:pointer; }
textarea { width:100%; margin-top:5px; }
</style>

</head>

<body>

<h2>🚚 Panel Empleado</h2>

<div class="card">
  <input type="text" id="nombre" placeholder="Tu nombre">
  <input type="date" id="fecha">
  <button onclick="verClientes()">Ver clientes</button>
</div>

<div id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 🔧 NORMALIZAR
function normalizar(texto) {
  return texto
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  databaseURL: "TU_DATABASE_URL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = {};
let nombreActual = "";
let fechaActual = "";

// 📡 TIEMPO REAL
db.ref("clientes").on("value", snap => {
  data = snap.val() || {};
  render();
});

// 📅 HOY
function hoy() {
  return new Date().toISOString().split("T")[0];
}

// 🔎 VER CLIENTES
function verClientes() {
  nombreActual = normalizar(document.getElementById("nombre").value);
  fechaActual = document.getElementById("fecha").value || hoy();

  if (!nombreActual) {
    alert("Escribí tu nombre");
    return;
  }

  render();
}

// ✔️ ENTREGADO + OBSERVACIÓN
function marcarRecibido(id, c, textarea) {
  const obs = textarea.value;

  db.ref("clientes/" + id).update({
    entregado: true,
    hora: new Date().toLocaleTimeString(),
    observacion: obs
  });
}

// 🎨 RENDER
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (!nombreActual) return;

  Object.entries(data)
    .filter(([id,c]) =>
      normalizar(c.empleado) === nombreActual &&
      c.fecha === fechaActual
    )
    .forEach(([id,c]) => {

      const card = document.createElement("div");
      card.className = "card";

      const titulo = document.createElement("b");
      titulo.textContent = c.nombre;

      const estado = document.createElement("div");
      estado.textContent = c.entregado
        ? "✔ Entregado " + (c.hora || "")
        : "Pendiente";

      card.appendChild(titulo);
      card.appendChild(document.createElement("br"));
      card.appendChild(estado);

      // OBSERVACIONES
      if (!c.entregado) {
        const textarea = document.createElement("textarea");
        textarea.placeholder = "Observaciones...";

        const btn = document.createElement("button");
        btn.textContent = "Marcar recibido";
        btn.onclick = () => marcarRecibido(id, c, textarea);

        card.appendChild(textarea);
        card.appendChild(btn);
      } else if (c.observacion) {
        const obs = document.createElement("div");
        obs.textContent = "Obs: " + c.observacion;
        card.appendChild(obs);
      }

      lista.appendChild(card);
    });
}
</script>

</body>
</html>
