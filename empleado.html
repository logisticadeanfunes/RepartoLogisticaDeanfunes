<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Empleado</title>
<style>
body { font-family: Arial; padding:20px; }
.cliente { margin:10px 0; }
</style>
</head>

<body>

<h2>🚚 Panel Empleado</h2>

<input type="text" id="nombre" placeholder="Tu nombre">
<input type="date" id="fecha">
<button onclick="verClientes()">Ver clientes</button>

<hr>

<h3>➕ Agregar cliente</h3>
<input type="text" id="nuevoCliente" placeholder="Nombre cliente">
<button onclick="agregarCliente()">Agregar</button>

<hr>

<div id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 🔧 NORMALIZAR TEXTO
function normalizar(texto) {
  return texto
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  databaseURL: "TU_DATABASE_URL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = {};
let nombreActual = "";
let fechaActual = "";

// 📡 TIEMPO REAL
db.ref("clientes").on("value", snap => {
  data = snap.val() || {};
  render();
});

// 📅 HOY
function hoy() {
  return new Date().toISOString().split("T")[0];
}

// 🔎 VER CLIENTES
function verClientes() {
  nombreActual = normalizar(document.getElementById("nombre").value);
  fechaActual = document.getElementById("fecha").value || hoy();

  if (!nombreActual) {
    alert("Escribí tu nombre");
    return;
  }

  render();
}

// ➕ AGREGAR CLIENTE
function agregarCliente() {
  const cliente = document.getElementById("nuevoCliente").value;
  const nombre = document.getElementById("nombre").value;
  const fecha = document.getElementById("fecha").value || hoy();

  if (!cliente || !nombre) {
    alert("Completar datos");
    return;
  }

  db.ref("clientes").push({
    nombre: cliente,
    empleado: normalizar(nombre),
    fecha: fecha,
    entregado: false,
    hora: null
  });

  document.getElementById("nuevoCliente").value = "";
}

// ✔️ ENTREGADO
function toggle(id, c) {
  db.ref("clientes/" + id).update({
    entregado: !c.entregado,
    hora: !c.entregado ? new Date().toLocaleTimeString() : null
  });
}

// 🎨 RENDER
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (!nombreActual) return;

  Object.entries(data)
    .filter(([id,c]) =>
      normalizar(c.empleado) === nombreActual &&
      c.fecha === fechaActual
    )
    .forEach(([id,c]) => {

      const div = document.createElement("div");
      div.className = "cliente";

      const check = document.createElement("input");
      check.type = "checkbox";
      check.checked = c.entregado;
      check.onchange = () => toggle(id,c);

      div.appendChild(check);
      div.append(" " + c.nombre);

      if (c.entregado && c.hora) {
        div.append(" ✔ " + c.hora);
      }

      lista.appendChild(div);
    });
}
</script>

</body>
</html>
