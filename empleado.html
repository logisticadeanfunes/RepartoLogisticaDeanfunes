<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Empleado</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#eaeaea; /* gris */
}

.card {
  background:#d0ebff; /* azul claro */
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* Inputs y botones */
input, button, textarea {
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#4dabf7;
  color:white;
  border:none;
}

button:hover {
  background:#339af0;
}

/* TABLA (jefe) */
table {
  width:100%;
  border-collapse: collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th {
  background:#74c0fc;
  color:white;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

/* Estados */
.entregado {
  color:green;
  font-weight:bold;
}

.pendiente {
  color:red;
  font-weight:bold;
}
</style>

</head>

<body>

<h2>🚚 Panel Empleado</h2>

<div class="card">
  <input type="text" id="nombre" placeholder="Tu nombre">
  <input type="date" id="fecha">
  <button onclick="verClientes()">Ver clientes</button>
</div>

<div id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// NORMALIZAR
function normalizar(texto) {
  return texto.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

const firebaseConfig = {
  apiKey: "AIzaSyB7W3rnQ8iuwyUKgZam4DIdyFkSp7Yh66g",
  databaseURL: "https://repartobackup-1ef28-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = {};
let nombreActual = "";
let fechaActual = "";

// TIEMPO REAL
db.ref("clientes").on("value", snap => {
  data = snap.val() || {};
  render();
});

function hoy() {
  return new Date().toISOString().split("T")[0];
}

// VER CLIENTES
function verClientes() {
  nombreActual = normalizar(document.getElementById("nombre").value);
  fechaActual = document.getElementById("fecha").value || hoy();

  if (!nombreActual) {
    alert("Escribí tu nombre");
    return;
  }

  render();
}

// MARCAR ENTREGADO
function marcar(id, c) {
  db.ref("clientes/" + id).update({
    entregado: !c.entregado,
    hora: !c.entregado ? new Date().toLocaleString('es-AR') : null
  });
}
// RENDER
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (!nombreActual) return;

  Object.entries(data)
    .filter(([id,c]) =>
      normalizar(c.empleado) === nombreActual &&
      c.fecha === fechaActual
    )
    .forEach(([id,c]) => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <b>${c.nombre}</b><br>
        Estado: ${c.entregado ? "✔️ Entregado" : "Pendiente"}<br>
        Hora: ${c.hora || "-"}<br>
        Observación: ${c.observacion || "-"}<br>
      `;

      const btn = document.createElement("button");
      btn.textContent = c.entregado ? "Desmarcar" : "Marcar entregado";
      btn.onclick = () => marcar(id,c);

      card.appendChild(btn);

      lista.appendChild(card);
    });
}
</script>

</body>
</html>
