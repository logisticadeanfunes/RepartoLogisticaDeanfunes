<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Empleado</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h2>🚚 Panel Empleado</h2>

<div class="card">
  <input type="text" id="nombre" placeholder="Tu nombre">
  <input type="date" id="fecha">
  <button onclick="verClientes()">Ver clientes</button>
</div>

<div id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// NORMALIZAR
function normalizar(texto) {
  return texto.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

const firebaseConfig = {
  apiKey: "AIzaSyB7W3rnQ8iuwyUKgZam4DIdyFkSp7Yh66g",
  databaseURL: "https://repartobackup-1ef28-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = {};
let nombreActual = "";
let fechaActual = "";

// TIEMPO REAL
db.ref("clientes").on("value", snap => {
  data = snap.val() || {};
  render();
});

function hoy() {
  return new Date().toISOString().split("T")[0];
}

// VER CLIENTES
function verClientes() {
  nombreActual = normalizar(document.getElementById("nombre").value);
  fechaActual = document.getElementById("fecha").value || hoy();

  if (!nombreActual) {
    alert("Escribí tu nombre");
    return;
  }

  render();
}

// MARCAR ENTREGADO
function marcar(id, c) {
  db.ref("clientes/" + id).update({
    entregado: !c.entregado,
    hora: !c.entregado ? new Date().toLocaleTimeString() : null
  });
}

// RENDER
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (!nombreActual) return;

  Object.entries(data)
    .filter(([id,c]) =>
      normalizar(c.empleado) === nombreActual &&
      c.fecha === fechaActual
    )
    .forEach(([id,c]) => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <b>${c.nombre}</b><br>
        Estado: ${c.entregado ? "✔️ Entregado" : "Pendiente"}<br>
        Hora: ${c.hora || "-"}<br>
        Observación: ${c.observacion || "-"}<br>
      `;

      const btn = document.createElement("button");
      btn.textContent = c.entregado ? "Desmarcar" : "Marcar entregado";
      btn.onclick = () => marcar(id,c);

      card.appendChild(btn);

      lista.appendChild(card);
    });
}
</script>

</body>
</html>
