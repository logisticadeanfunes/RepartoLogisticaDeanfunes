<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jefe</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

button { cursor:pointer; }
</style>

</head>

<body>

<div id="login" class="card">
  <h3>🔐 Login jefe</h3>
  <input type="password" id="pass">
  <button id="btnLogin">Entrar</button>
</div>

<div id="panel" style="display:none;">

  <div class="card">
    <h2>👨‍💼 Logistica Deanfunes</h2>

    <input type="text" id="clienteInput" placeholder="Cliente">
    <input type="text" id="empleadoInput" placeholder="Empleado">
    <input type="date" id="fechaInput">
    <input type="text" id="obsInput" placeholder="Observaciones">
    <button id="btnAgregar">Agregar</button>
  </div>

  <div class="card">
    <h3>📋 Lista</h3>

    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Empleado</th>
          <th>Fecha</th>
          <th>Estado</th>
          <th>Hora</th>
          <th>Observaciones</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script>
// NORMALIZAR
function normalizar(texto) {
  return texto.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// LOGIN
const PASSWORD = "1234";

document.getElementById("btnLogin").onclick = () => {
  if (document.getElementById("pass").value === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Incorrecta");
  }
};
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7W3rnQ8iuwyUKgZam4DIdyFkSp7Yh66g",
  databaseURL: "https://repartobackup-1ef28-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = {};

db.ref("clientes").on("value", snap => {
  data = snap.val() || {};
  render();
});

// AGREGAR
document.getElementById("btnAgregar").onclick = () => {
  const cliente = clienteInput.value;
  const empleado = empleadoInput.value;
  const fecha = fechaInput.value;
  const observacion = obsInput.value;

  if (!cliente || !empleado || !fecha) {
    alert("Completar");
    return;
  }

  db.ref("clientes").push({
    nombre: cliente,
    empleado: normalizar(empleado),
    fecha,
    entregado:false,
    hora:null,
    observacion
  });

  clienteInput.value = "";
  empleadoInput.value = "";
  fechaInput.value = "";
  obsInput.value = "";
};

// BORRAR
function borrar(id) {
  if (confirm("¿Eliminar cliente?")) {
    db.ref("clientes/" + id).remove();
  }
}

// RENDER
function render() {
  lista.innerHTML = "";

  Object.entries(data).forEach(([id,c]) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${c.nombre}</td>
      <td>${c.empleado}</td>
      <td>${c.fecha}</td>
      <td>${c.entregado ? '✔️ Entregado' : 'Pendiente'}</td>
      <td>${c.hora || '-'}</td>
      <td>${c.observacion || '-'}</td>
      <td><button onclick="borrar('${id}')">🗑️</button></td>
    `;

    lista.appendChild(tr);
  });
}
</script>

</body>
</html>
