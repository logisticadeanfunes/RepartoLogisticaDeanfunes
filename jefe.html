<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jefe</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f5f5f5;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, button {
  padding:8px;
  margin:5px;
}

button {
  cursor:pointer;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

th {
  background:#eee;
}

.entregado {
  color:green;
  font-weight:bold;
}

.pendiente {
  color:red;
  font-weight:bold;
}
</style>

</head>

<body>

<div id="login" class="card">
  <h3>🔐 Login jefe</h3>
  <input type="password" id="pass" placeholder="Contraseña">
  <button id="btnLogin">Entrar</button>
</div>

<div id="panel" style="display:none;">

  <div class="card">
    <h2>👨‍💼 Panel Jefe</h2>

    <input type="text" id="cliente" placeholder="Cliente">
    <input type="text" id="empleado" placeholder="Empleado">
    <input type="date" id="fecha">
    <button id="btnAgregar">Agregar</button>
  </div>

  <div class="card">
    <h3>🔎 Filtros</h3>

    <input type="text" id="filtroEmpleado" placeholder="Filtrar por empleado">
    <input type="date" id="filtroFecha">

    <button onclick="render()">Aplicar filtro</button>
  </div>

  <div class="card">
    <h3>📋 Lista de entregas</h3>

    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Empleado</th>
          <th>Fecha</th>
          <th>Estado</th>
          <th>Hora</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script>
// 🔧 NORMALIZAR
function normalizar(texto) {
  return texto
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// 🔐 LOGIN
const PASSWORD = "1234";

document.getElementById("btnLogin").addEventListener("click", function() {
  const pass = document.getElementById("pass").value;

  if (pass === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Contraseña incorrecta");
  }
});
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7W3rnQ8iuwyUKgZam4DIdyFkSp7Yh66g",
  databaseURL: "https://repartobackup-1ef28-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = {};

// 📡 TIEMPO REAL
db.ref("clientes").on("value", snap => {
  data = snap.val() || {};
  render();
});

// ➕ AGREGAR CLIENTE
document.getElementById("btnAgregar").addEventListener("click", function() {
  const cliente = document.getElementById("cliente").value;
  const empleado = document.getElementById("empleado").value;
  const fecha = document.getElementById("fecha").value;

  if (!cliente || !empleado || !fecha) {
    alert("Completar todos los campos");
    return;
  }

  db.ref("clientes").push({
    nombre: cliente,
    empleado: normalizar(empleado),
    fecha: fecha,
    entregado: false,
    hora: null
  });
});

// 🎨 RENDER CON FILTROS
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const filtroEmp = normalizar(document.getElementById("filtroEmpleado").value || "");
  const filtroFecha = document.getElementById("filtroFecha").value;

  Object.values(data)
    .filter(c => {
      const matchEmpleado = filtroEmp ? normalizar(c.empleado).includes(filtroEmp) : true;
      const matchFecha = filtroFecha ? c.fecha === filtroFecha : true;
      return matchEmpleado && matchFecha;
    })
    .forEach(c => {

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${c.nombre}</td>
        <td>${c.empleado}</td>
        <td>${c.fecha}</td>
        <td class="${c.entregado ? 'entregado' : 'pendiente'}">
          ${c.entregado ? '✔ Entregado' : 'Pendiente'}
        </td>
        <td>${c.hora || '-'}</td>
      `;

      lista.appendChild(tr);
    });
}
</script>

</body>
</html>
