<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jefe</title>
</head>

<body>

<div id="login">
  <h3>Login jefe</h3>
  <input type="password" id="pass">
  <button id="btnLogin">Entrar</button>
</div>

<div id="panel" style="display:none;">
  <h2>👨‍💼 Panel Jefe</h2>

  <input type="text" id="cliente" placeholder="Cliente">
  <input type="text" id="empleado" placeholder="Empleado">
  <input type="date" id="fecha">
  <button id="btnAgregar">Agregar</button>

  <div id="lista"></div>
</div>

<script>
// 🔐 LOGIN PRIMERO (NO DEPENDE DE FIREBASE)
const PASSWORD = "1234";

document.getElementById("btnLogin").addEventListener("click", function() {
  const pass = document.getElementById("pass").value;

  if (pass === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Contraseña incorrecta");
  }
});
</script>

<!-- FIREBASE DESPUÉS -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
try {
  const firebaseConfig = {
    apiKey: "AIzaSyB7W3rnQ8iuwyUKgZam4DIdyFkSp7Yh66g",
    databaseURL: "https://repartobackup-1ef28-default-rtdb.firebaseio.com/"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let data = {};

  db.ref("clientes").on("value", snap => {
    data = snap.val() || {};
    render();
  });

  document.getElementById("btnAgregar").addEventListener("click", function() {
    const cliente = document.getElementById("cliente").value;
    const empleado = document.getElementById("empleado").value;
    const fecha = document.getElementById("fecha").value;

    if (!cliente || !empleado) {
      alert("Completar datos");
      return;
    }

    db.ref("clientes").push({
      nombre: cliente,
      empleado,
      fecha,
      entregado: false
    });
  });

  function render() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    Object.values(data).forEach(c => {
      const div = document.createElement("div");
      div.textContent = c.nombre + " - " + c.empleado + " - " + (c.entregado ? "✔" : "❌");
      lista.appendChild(div);
    });
  }

} catch (error) {
  console.log("Error Firebase:", error);
}
</script>

</body>
</html>
